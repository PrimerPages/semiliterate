name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest -q

  action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create sample source
        shell: bash
        run: |
          mkdir -p action-fixture
          cat <<'EOF' > action-fixture/module.py
          """md
          # Action Title
          """
          EOF

      - name: Run local action
        id: semiliterate
        uses: ./
        with:
          source: action-fixture
          out: action-build

      - name: Verify generated docs
        shell: bash
        run: |
          test -f "${{ steps.semiliterate.outputs.out }}/module.md"
          grep '^# Action Title$' "${{ steps.semiliterate.outputs.out }}/module.md"

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Verify source version placeholder
        run: |
          grep '^version = "0.0.0"$' pyproject.toml

      - name: Build distributions
        run: python -m build

  success:
    needs: [test, action, build]
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "All tests passed and build succeeded!"
